<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>부품 목록 — Container Sim</title>
<link rel="stylesheet" href="css/style.css">
<style>
  .page { flex:1; padding:24px; max-width:1100px; margin:0 auto; width:100%; }
  .page-title { font-size:22px; font-weight:700; margin-bottom:4px; }
  .page-sub { color:var(--text-dim); font-size:12px; margin-bottom:24px; font-family:var(--font-mono); }

  .cont-selector { display:flex; gap:10px; margin-bottom:24px; flex-wrap:wrap; }
  .cont-card {
    flex:1; max-width:260px; min-width:140px;
    background:var(--surface); border:2px solid var(--border);
    border-radius:8px; padding:14px 18px; cursor:pointer; transition:all 0.2s;
  }
  .cont-card.active { border-color:var(--accent); background:rgba(0,212,255,.06); }
  .cont-card:hover:not(.active) { border-color:#3a3d48; }
  .cont-card-label { font-size:13px; font-weight:700; margin-bottom:4px; }
  .cont-card-spec  { font-family:var(--font-mono); font-size:10px; color:var(--text-dim); }

  .parts-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:12px; }

  .part-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:8px; padding:16px; transition:all 0.2s;
    position:relative; overflow:hidden;
  }
  .part-card::before {
    content:''; position:absolute; left:0; top:0; bottom:0;
    width:4px; border-radius:4px 0 0 4px;
  }
  .part-card:hover { border-color:#3a3d48; transform:translateY(-1px); }

  .part-card-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:10px; }
  .part-code-big { font-family:var(--font-mono); font-size:28px; font-weight:700; line-height:1; }
  .part-name-big { font-size:14px; font-weight:600; margin-top:2px; }

  .part-dims-row {
    background:var(--surface2); border-radius:5px; padding:8px 10px;
    font-family:var(--font-mono); font-size:11px; color:var(--text-dim);
    margin-bottom:12px; display:flex; gap:12px;
  }
  .part-dims-row span { color:var(--text); }
  .part-card-bottom { display:flex; align-items:center; }

  .qty-ctrl { display:flex; align-items:center; gap:4px; flex-wrap:wrap; }
  .qty-btn {
    background:var(--surface2); border:1px solid var(--border);
    color:var(--text-dim); border-radius:4px; font-size:11px; padding:3px 7px;
    cursor:pointer; font-family:var(--font-mono); transition:all 0.15s; line-height:1.5;
  }
  .qty-btn:hover { border-color:var(--accent); color:var(--accent); }
  .qty-input {
    width:50px; background:var(--surface2); border:1px solid var(--border);
    color:var(--text); border-radius:4px; text-align:center;
    font-family:var(--font-mono); font-size:13px; font-weight:700;
    padding:3px 4px; outline:none;
  }
  .qty-input:focus { border-color:var(--accent); }
  .qty-input::-webkit-inner-spin-button { -webkit-appearance:none; }
  .qty-total { font-size:10px; color:var(--text-dim); font-family:var(--font-mono); margin-left:2px; }

  .part-progress-wrap { background:var(--surface2); border-radius:3px; height:4px; margin-top:10px; overflow:hidden; }
  .part-progress-bar  { height:100%; border-radius:3px; transition:width .3s; }

  .action-bar {
    position:sticky; bottom:0;
    background:var(--surface); border-top:1px solid var(--border);
    padding:12px 24px; display:flex; align-items:center; justify-content:space-between;
    margin-top:24px; gap:12px;
  }
  .action-bar-info { font-size:12px; color:var(--text-dim); }
  .action-bar-info b { color:var(--text); }
  .action-btns { display:flex; gap:8px; flex-shrink:0; }

  /* ── 모바일 햄버거 메뉴 ── */
  .nav-hamburger {
    display:none; flex-direction:column; justify-content:center; gap:5px;
    width:36px; height:36px; padding:6px; cursor:pointer;
    background:none; border:none; margin-left:auto;
  }
  .nav-hamburger span {
    display:block; height:2px; background:var(--text-dim);
    border-radius:2px; transition:all 0.2s;
  }
  .nav-hamburger.open span:nth-child(1) { transform:translateY(7px) rotate(45deg); }
  .nav-hamburger.open span:nth-child(2) { opacity:0; }
  .nav-hamburger.open span:nth-child(3) { transform:translateY(-7px) rotate(-45deg); }

  .nav-mobile-menu {
    display:none; position:fixed; top:48px; left:0; right:0;
    background:var(--surface); border-bottom:1px solid var(--border);
    padding:8px 0; z-index:200; flex-direction:column;
  }
  .nav-mobile-menu.open { display:flex; }
  .nav-mobile-menu .nav-link {
    padding:12px 20px; font-size:13px; border-radius:0;
    border-left:3px solid transparent;
  }
  .nav-mobile-menu .nav-link.active { border-left-color:var(--accent); }

  @media (max-width: 640px) {
    nav { padding:0 12px; position:relative; }
    .nav-links { display:none; }
    .nav-hamburger { display:flex; }
    .nav-right { display:none; }
    .nav-logo-sub { display:none; }

    .page { padding:16px 12px; }
    .page-title { font-size:18px; }
    .cont-card { max-width:100%; padding:12px 14px; }
    .parts-grid { grid-template-columns:1fr; }
    .part-code-big { font-size:22px; }

    .action-bar { padding:10px 12px; flex-wrap:wrap; }
    .action-bar-info { font-size:11px; }
    .action-btns { width:100%; justify-content:flex-end; }
  }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">
    <div class="nav-logo-icon">C</div>
    <div>
      <div class="nav-logo-text">CONTAINER SIM</div>
      <div class="nav-logo-sub">MQ4 HEV | GAMMA2 1.6 T-GDI</div>
    </div>
  </a>
  <div class="nav-links">
    <a class="nav-link active" href="index.html">부품 목록</a>
    <a class="nav-link" href="viewer.html">3D 뷰어</a>
    <a class="nav-link" href="box.html">3D 박스</a>
    <a class="nav-link" href="Pallet.html">팔레트</a>
  </div>
  <div class="nav-right">
    <div class="nav-pill">적재: <b id="navLoaded">0</b>/<b id="navTotal">0</b></div>
  </div>
  <button class="nav-hamburger" id="hamburger" onclick="toggleMobileMenu()" aria-label="메뉴">
    <span></span><span></span><span></span>
  </button>
</nav>

<!-- 모바일 드롭다운 메뉴 -->
<div class="nav-mobile-menu" id="mobileMenu">
  <a class="nav-link active" href="index.html">부품 목록</a>
  <a class="nav-link" href="viewer.html">3D 뷰어</a>
  <a class="nav-link" href="box.html">3D 박스</a>
  <a class="nav-link" href="Pallet.html">팔레트</a>
</div>

<div class="page">
  <div class="page-title">부품 목록</div>
  <div class="page-sub">부품 수량 설정 및 컨테이너 타입 선택 (최대 300개/종)</div>

  <div class="cont-selector" id="contSelector"></div>
  <div class="parts-grid" id="partsGrid" style="display:none;"></div>
</div>

<div class="action-bar">
  <div class="action-bar-info">
    컨테이너: <b id="contLabel">-</b>
    <span id="totalParts" style="display:none"></span>
  </div>
  <div class="action-btns">
    <button class="btn btn-danger" onclick="handleReset()">초기화</button>
    <button class="btn btn-primary" onclick="location.href='viewer.html'">3D 뷰어</button>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/parts.js"></script>
<script>
  function toggleMobileMenu() {
    const menu = document.getElementById('mobileMenu');
    const btn = document.getElementById('hamburger');
    const isOpen = menu.classList.toggle('open');
    btn.classList.toggle('open', isOpen);
  }
  // 메뉴 외부 클릭 시 닫기
  document.addEventListener('click', e => {
    const menu = document.getElementById('mobileMenu');
    const btn = document.getElementById('hamburger');
    if (!menu.contains(e.target) && !btn.contains(e.target)) {
      menu.classList.remove('open');
      btn.classList.remove('open');
    }
  });
</script>
</body>
</html>
