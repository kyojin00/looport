<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>팔레트 시뮬레이터 — Container Sim</title>
<link rel="stylesheet" href="css/style.css">
<style>
  body {
    overflow: hidden;
    display: grid;
    grid-template-columns: 280px 1fr 260px;
    grid-template-rows: 52px 1fr;
    height: 100vh;
  }
  nav { grid-column: 1 / -1; }

  .left-panel {
    background: var(--surface); border-right: 1px solid var(--border);
    overflow-y: auto; padding: 12px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .right-panel {
    background: var(--surface); border-left: 1px solid var(--border);
    overflow-y: auto; padding: 12px;
    display: flex; flex-direction: column; gap: 10px;
  }

  .panel-section { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
  .section-title {
    font-size: 10px; letter-spacing: 0.1em; color: var(--text-dim);
    text-transform: uppercase; font-weight: 700; margin-bottom: 10px;
    display: flex; align-items: center; gap: 6px;
  }
  .section-title::before { content: ''; width: 3px; height: 11px; background: var(--accent); border-radius: 2px; display: block; flex-shrink: 0; }

  .input-row { margin-bottom: 8px; }
  .input-row label { font-size: 10px; color: var(--text-dim); display: block; margin-bottom: 3px; font-family: var(--font-mono); }
  .input-row input, .input-row select { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 6px 9px; font-family: var(--font-mono); font-size: 12px; border-radius: 5px; outline: none; transition: border-color 0.2s; }
  .input-row input:focus, .input-row select:focus { border-color: var(--accent); }
  .input-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .input-3col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

  .btn-block { width: 100%; padding: 8px; border: none; cursor: pointer; font-family: var(--font-sans); font-size: 12px; font-weight: 600; border-radius: 5px; transition: all 0.2s; margin-top: 4px; }
  .btn-block.primary { background: linear-gradient(135deg, var(--accent), #0066ff); color: #000; }
  .btn-block.primary:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn-block.ghost { background: transparent; color: var(--accent); border: 1px solid var(--border); }
  .btn-block.ghost:hover { border-color: var(--accent); background: rgba(56,189,248,.08); }
  .btn-block.danger { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }
  .btn-block.danger:hover { border-color: var(--red); color: var(--red); }

  .color-picker-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
  .color-swatch { width: 26px; height: 26px; border-radius: 4px; cursor: pointer; border: 2px solid transparent; transition: border-color 0.2s; }
  .color-swatch.active { border-color: var(--accent); }

  .pallet-list { display: flex; flex-direction: column; gap: 5px; max-height: 150px; overflow-y: auto; }
  .pallet-item { background: var(--bg); border: 1px solid var(--border); border-radius: 5px; padding: 7px 10px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 12px; transition: border-color 0.2s; }
  .pallet-item:hover { border-color: var(--text-dim); }
  .pallet-item.active { border-color: var(--accent); background: rgba(56,189,248,.06); }
  .pallet-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .pallet-label { flex: 1; }
  .pallet-remove { color: var(--red); font-size: 14px; line-height: 1; padding: 0 2px; background: none; border: none; cursor: pointer; opacity: 0.6; }
  .pallet-remove:hover { opacity: 1; }

  .canvas-area { position: relative; overflow: hidden; background: var(--bg); }
  #three-canvas { display: block; width: 100% !important; height: 100% !important; }
  .canvas-overlay { position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; }
  .ctrl-btn { background: rgba(23,27,39,.88); border: 1px solid var(--border); color: var(--text-dim); padding: 5px 12px; font-family: var(--font-mono); font-size: 10px; cursor: pointer; border-radius: 4px; transition: all 0.15s; backdrop-filter: blur(6px); }
  .ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }
  .ctrl-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(56,189,248,.1); }
  .view-hint { position: absolute; top: 12px; left: 12px; font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); line-height: 1.8; pointer-events: none; }
  .tooltip { position: absolute; background: rgba(17,21,39,.95); border: 1px solid var(--accent); border-radius: 6px; padding: 8px 12px; font-family: var(--font-mono); font-size: 11px; color: var(--text); pointer-events: none; display: none; z-index: 100; line-height: 1.6; }

  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .stat-box { background: var(--bg); border: 1px solid var(--border); border-radius: 5px; padding: 8px; text-align: center; }
  .stat-num { font-family: var(--font-mono); font-size: 18px; color: var(--accent); display: block; font-weight: 600; }
  .stat-label { font-size: 10px; color: var(--text-dim); margin-top: 2px; }
  .weight-bar-wrap { margin-top: 8px; }
  .weight-bar-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-dim); margin-bottom: 5px; }
  .weight-bar-track { height: 6px; background: var(--bg); border: 1px solid var(--border); border-radius: 3px; overflow: hidden; }
  .weight-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.4s ease; border-radius: 3px; }

  .box-list { max-height: 180px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
  .box-item { background: var(--bg); border: 1px solid var(--border); border-radius: 5px; padding: 7px 10px; font-size: 11px; display: flex; align-items: center; gap: 7px; cursor: pointer; transition: border-color 0.15s; }
  .box-item:hover { border-color: var(--text-dim); }
  .box-item.selected { border-color: var(--accent2); }
  .box-color-dot { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }
  .box-info { flex: 1; }
  .box-info-main { color: var(--text); }
  .box-info-sub { color: var(--text-dim); font-size: 10px; font-family: var(--font-mono); }
  .box-remove { color: var(--red); font-size: 13px; line-height: 1; cursor: pointer; background: none; border: none; opacity: 0.6; }
  .box-remove:hover { opacity: 1; }

  /* ── 햄버거 ── */
  .nav-hamburger { display:none; flex-direction:column; justify-content:center; gap:5px; width:36px; height:36px; padding:6px; cursor:pointer; background:none; border:none; margin-left:auto; flex-shrink:0; }
  .nav-hamburger span { display:block; height:2px; background:var(--text-dim); border-radius:2px; transition:all 0.2s; }
  .nav-hamburger.open span:nth-child(1) { transform:translateY(7px) rotate(45deg); }
  .nav-hamburger.open span:nth-child(2) { opacity:0; }
  .nav-hamburger.open span:nth-child(3) { transform:translateY(-7px) rotate(-45deg); }
  .nav-mobile-menu { display:none; position:fixed; top:52px; left:0; right:0; background:var(--surface); border-bottom:1px solid var(--border); padding:8px 0; z-index:500; flex-direction:column; }
  .nav-mobile-menu.open { display:flex; }
  .nav-mobile-menu .nav-link { padding:12px 20px; font-size:13px; border-radius:0; border-left:3px solid transparent; }
  .nav-mobile-menu .nav-link.active { border-left-color:var(--accent); }

  /* ── 모바일 탭바 ── */
  @media (max-width: 768px) {
    body { grid-template-columns: 1fr; grid-template-rows: 52px 1fr; }
    .nav-links { display:none !important; }
    .nav-right  { display:none !important; }
    .nav-hamburger { display:flex; }
    .nav-logo-sub { display:none; }

    .left-panel, .right-panel {
      display: none; position: fixed; bottom: 52px; left: 0; right: 0;
      max-height: 55vh; z-index: 200; border-radius: 12px 12px 0 0;
      border-top: 2px solid var(--accent); overflow-y: auto; padding: 14px;
    }
    .left-panel.mob-open, .right-panel.mob-open { display: flex; }
    .canvas-area { grid-row: 2; grid-column: 1; height: calc(100dvh - 52px - 52px); }

    #mob-tabbar { display: flex !important; position: fixed; bottom: 0; left: 0; right: 0; height: 52px; background: var(--surface); border-top: 1px solid var(--border); z-index: 300; }
    .mob-tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; font-size: 10px; color: var(--text-dim); cursor: pointer; border: none; background: transparent; font-family: var(--font-sans); font-weight: 600; transition: color 0.2s; -webkit-tap-highlight-color: transparent; }
    .mob-tab.active { color: var(--accent); }
    .mob-tab-icon { font-size: 15px; line-height: 1; font-style: normal; }
    .canvas-overlay { bottom: 58px; }
    .view-hint { display: none; }
    .input-row input, .input-row select { font-size: 16px; padding: 10px; }
    .btn-block { padding: 12px; font-size: 14px; }
  }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">
    <div class="nav-logo-icon">C</div>
    <div>
      <div class="nav-logo-text">CONTAINER SIM</div>
      <div class="nav-logo-sub">MQ4 HEV | GAMMA2 1.6 T-GDI</div>
    </div>
  </a>
  <div class="nav-links">
    <a class="nav-link" href="index.html">부품 목록</a>
    <a class="nav-link" href="viewer.html">3D 뷰어</a>
    <a class="nav-link" href="box.html">3D 박스</a>
    <a class="nav-link active" href="Pallet.html">팔레트</a>
  </div>
  <div class="nav-right">
    <div class="nav-pill">파렛트: <b id="hstat-pallets">0</b> &nbsp;|&nbsp; 박스: <b id="hstat-boxes">0</b> &nbsp;|&nbsp; <b id="hstat-weight">0 kg</b></div>
  </div>
  <button class="nav-hamburger" id="hamburger" onclick="toggleMobileMenu()" aria-label="메뉴">
    <span></span><span></span><span></span>
  </button>
</nav>

<div class="nav-mobile-menu" id="mobileMenu">
  <a class="nav-link" href="index.html">부품 목록</a>
  <a class="nav-link" href="viewer.html">3D 뷰어</a>
  <a class="nav-link" href="box.html">3D 박스</a>
  <a class="nav-link active" href="Pallet.html">팔레트</a>
</div>

<!-- LEFT PANEL -->
<div class="left-panel" id="leftPanel">
  <div class="panel-section">
    <div class="section-title">파렛트 추가</div>
    <div class="input-row"><label>파렛트 이름</label><input type="text" id="pallet-name" value="P-001" /></div>
    <div class="input-2col">
      <div class="input-row"><label>가로 (mm)</label><input type="number" id="pallet-w" value="1430" min="100" max="3000" /></div>
      <div class="input-row"><label>세로 (mm)</label><input type="number" id="pallet-d" value="1090" min="100" max="3000" /></div>
    </div>
    <div class="input-2col">
      <div class="input-row"><label>높이 (mm)</label><input type="number" id="pallet-h" value="150" min="50" max="400" /></div>
      <div class="input-row"><label>자체하중 (kg)</label><input type="number" id="pallet-self-weight" value="25" min="1" max="500" /></div>
    </div>
    <div class="input-row"><label>최대 허용하중 (kg)</label><input type="number" id="pallet-max-load" value="1500" min="100" max="10000" /></div>
    <div class="input-row">
      <label>파렛트 형태</label>
      <select id="pallet-type" onchange="onTypeChange()">
        <option value="gamma2_mq4">GAMMA2 1.6 T-GDI MQ4 HEV (1440×2270×930)</option>
        <option value="meshpallet">금호 메시 파렛트 (1430×1090)</option>
        <option value="karton">금호 카톤 파렛트 (1433×1100)</option>
        <option value="lotte_mesh">롯데 메시 파렛트 (1443×1110)</option>
        <option value="lotte_frame">롯데 프레임 파렛트 (1440×1107)</option>
        <option value="modeon">모드온 메시 파렛트 (1430×1090)</option>
        <option value="modeon_solid">모드온 솔리드 파렛트 (1430×1090)</option>
        <option value="drum_h" selected>수평 드럼 파렛트 2롤 (1430×1090)</option>
      </select>
    </div>
    <div class="input-row" id="row-wall-h"><label>벽 높이 (mm)</label><input type="number" id="pallet-wall-h" value="920" min="100" max="2000" /></div>
    <button class="btn-block primary" onclick="addPallet()">파렛트 추가</button>
  </div>

  <div class="panel-section">
    <div class="section-title">파렛트 목록</div>
    <div class="pallet-list" id="pallet-list">
      <div style="font-size:11px;color:var(--text-dim);text-align:center;padding:12px;">파렛트를 추가하세요</div>
    </div>
  </div>

  <div class="panel-section">
    <div class="section-title">박스 적재</div>
    <div class="input-3col">
      <div class="input-row"><label>가로</label><input type="number" id="box-w" value="400" min="50" max="1200" /></div>
      <div class="input-row"><label>세로</label><input type="number" id="box-d" value="300" min="50" max="1000" /></div>
      <div class="input-row"><label>높이</label><input type="number" id="box-h" value="300" min="50" max="1000" /></div>
    </div>
    <div class="input-row"><label>무게 (kg)</label><input type="number" id="box-weight" value="20" min="0.1" max="2000" step="0.1" /></div>
    <div class="input-row">
      <label>박스 색상</label>
      <div class="color-picker-row">
        <div class="color-swatch active" style="background:#e8aa5a;" data-color="#e8aa5a" onclick="selectColor(this)"></div>
        <div class="color-swatch" style="background:#5aaae8;" data-color="#5aaae8" onclick="selectColor(this)"></div>
        <div class="color-swatch" style="background:#5ae87a;" data-color="#5ae87a" onclick="selectColor(this)"></div>
        <div class="color-swatch" style="background:#e85a5a;" data-color="#e85a5a" onclick="selectColor(this)"></div>
        <div class="color-swatch" style="background:#c45ae8;" data-color="#c45ae8" onclick="selectColor(this)"></div>
        <div class="color-swatch" style="background:#e0e0e0;" data-color="#e0e0e0" onclick="selectColor(this)"></div>
      </div>
    </div>
    <button class="btn-block primary" onclick="addBox()">박스 적재</button>
    <button class="btn-block danger" onclick="clearBoxes()">선택 파렛트 박스 초기화</button>
  </div>
</div>

<!-- 3D CANVAS -->
<div class="canvas-area">
  <canvas id="three-canvas"></canvas>
  <div class="view-hint">
    우클릭 드래그: 회전<br>
    좌클릭 드래그: 이동<br>
    휠: 줌
  </div>
  <div class="canvas-overlay">
    <button class="ctrl-btn active" id="btn-perspective" onclick="setView('perspective')">투시도</button>
    <button class="ctrl-btn" id="btn-top" onclick="setView('top')">TOP</button>
    <button class="ctrl-btn" id="btn-front" onclick="setView('front')">FRONT</button>
    <button class="ctrl-btn" id="btn-side" onclick="setView('side')">SIDE</button>
    <button class="ctrl-btn" id="btn-iso" onclick="setView('iso')">ISO</button>
    <button class="ctrl-btn" id="btn-grid" onclick="toggleGrid()">격자</button>
  </div>
  <div class="tooltip" id="tooltip"></div>
</div>

<!-- RIGHT PANEL -->
<div class="right-panel" id="rightPanel">
  <div class="panel-section">
    <div class="section-title">적재 현황</div>
    <div class="stat-grid">
      <div class="stat-box"><span class="stat-num" id="stat-pallets">0</span><div class="stat-label">파렛트 수</div></div>
      <div class="stat-box"><span class="stat-num" id="stat-boxes">0</span><div class="stat-label">총 박스</div></div>
      <div class="stat-box"><span class="stat-num" id="stat-weight">0</span><div class="stat-label">총무게 (kg)</div></div>
      <div class="stat-box"><span class="stat-num" id="stat-volume">0</span><div class="stat-label">적재율 (%)</div></div>
    </div>
    <div class="weight-bar-wrap" id="weight-bars"></div>
  </div>
  <div class="panel-section">
    <div class="section-title">선택 파렛트 정보</div>
    <div id="selected-pallet-info" style="font-size:11px;color:var(--text-dim);">파렛트를 클릭하여 선택하세요</div>
  </div>
  <div class="panel-section">
    <div class="section-title">박스 목록</div>
    <div class="box-list" id="box-list">
      <div style="font-size:11px;color:var(--text-dim);text-align:center;padding:12px;">박스가 없습니다</div>
    </div>
  </div>
</div>

<!-- 모바일 탭바 -->
<div id="mob-tabbar" style="display:none;">
  <button class="mob-tab active" id="tab-view" onclick="mobTab('view')"><span class="mob-tab-icon">◎</span>VIEW</button>
  <button class="mob-tab" id="tab-pallet" onclick="mobTab('pallet')"><span class="mob-tab-icon">▤</span>파렛트</button>
  <button class="mob-tab" id="tab-box" onclick="mobTab('box')"><span class="mob-tab-icon">▦</span>박스</button>
  <button class="mob-tab" id="tab-info" onclick="mobTab('info')"><span class="mob-tab-icon">≡</span>정보</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="js/pallet-three.js?v=1"></script>
<script src="js/pallet-mesh-base.js?v=1"></script>
<script src="js/pallet-mesh-pallet.js?v=1"></script>
<script src="js/pallet-logic.js?v=1"></script>
<script src="js/pallet-ui.js?v=1"></script>
<script>
  function toggleMobileMenu() {
    const menu = document.getElementById('mobileMenu');
    const btn = document.getElementById('hamburger');
    const isOpen = menu.classList.toggle('open');
    btn.classList.toggle('open', isOpen);
  }
  document.addEventListener('click', e => {
    const menu = document.getElementById('mobileMenu');
    const btn = document.getElementById('hamburger');
    if (!menu || !btn) return;
    if (!menu.contains(e.target) && !btn.contains(e.target)) {
      menu.classList.remove('open'); btn.classList.remove('open');
    }
  });
</script>
</body>
</html>
